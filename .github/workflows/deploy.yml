name: CI/CD pipeline

run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || format('Manual run by {0}', github.actor) }}

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Validate formatting
    runs-on: ubuntu-latest
    outputs:
      migrator_changed: ${{ steps.changes.outputs.migrator }}
      runtime_changed: ${{ steps.changes.outputs.runtime }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect image-related changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            migrator:
              - 'apps/migrator/**'
              - '**/Migrations/**'
              - 'backend/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'Autodor.slnx'
              - '.dockerignore'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_deploy-image.yml'
            runtime:
              - 'Dockerfile'
              - 'apps/api/**'
              - 'apps/app/**'
              - 'backend/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'global.json'
              - 'Autodor.slnx'
              - '.dockerignore'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_deploy-image.yml'
            frontend:
              - 'apps/app/**'

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore Autodor.slnx

      - name: Verify whitespace and using order
        run: dotnet format whitespace Autodor.slnx --verify-no-changes --no-restore

      - name: Verify unnecessary usings
        run: dotnet format style Autodor.slnx --diagnostics IDE0005 --verify-no-changes --severity info --no-restore

      - name: Set up Node.js
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: apps/app/package-lock.json

      - name: Install frontend dependencies
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        working-directory: apps/app
        run: npm ci

      - name: Validate frontend
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        working-directory: apps/app
        run: npm run ci

  migrator:
    name: Migrator
    needs: format
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.format.outputs.migrator_changed == 'true')
    uses: ./.github/workflows/_deploy-image.yml
    with:
      service_name: migrator
      image_name: autodor/migrator
      image_file: ./apps/migrator/Dockerfile
      webhook_urls_secret_name: MIGRATOR_WEBHOOK_URLS
    secrets: inherit

  runtime:
    name: Runtime
    needs: format
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || needs.format.outputs.runtime_changed == 'true')
    uses: ./.github/workflows/_deploy-image.yml
    with:
      service_name: runtime
      image_name: autodor/runtime
      image_file: ./Dockerfile
      webhook_urls_secret_name: RUNTIME_WEBHOOK_URLS
      build_args: GIT_SHA=${{ github.sha }}
      build_arg_secret_name: VITE_CLERK_PUBLISHABLE_KEY
    secrets: inherit
