name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches: [main, slice]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/autodor
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          secrets: vite_clerk_publishable_key=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Trigger Dokploy
        env:
          URL: ${{ secrets.DOKPLOY_API_URL }}
          KEY: ${{ secrets.DOKPLOY_API_KEY }}
          APPS: ${{ secrets.DOKPLOY_APP_IDS }}
        run: |
          set -euo pipefail

          : "${URL:?Missing DOKPLOY_API_URL secret}"
          : "${KEY:?Missing DOKPLOY_API_KEY secret}"
          : "${APPS:?Missing DOKPLOY_APP_IDS secret}"

          msg="$(git log -1 --pretty=%s)"
          IFS=',' read -ra app_array <<< "$APPS"

          for raw_app_id in "${app_array[@]}"; do
            app_id="$(echo "$raw_app_id" | xargs)"
            [[ -z "$app_id" ]] && continue

            jq -n \
              --arg id "$app_id" \
              --arg desc "Deploy latest [${GITHUB_SHA:0:7}]: $msg" \
              '{applicationId: $id, title: "CI deploy", description: $desc}' | \
            curl --fail-with-body --silent --show-error \
              -X POST "${URL%/}/api/application.deploy" \
              -H "x-api-key: $KEY" \
              -H "Content-Type: application/json" \
              -d @-
          done

      - uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: autodor
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}