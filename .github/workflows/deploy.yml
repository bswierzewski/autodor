name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - slice

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image and deploy metadata
        id: metadata
        run: |
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          image_name="$(echo 'ghcr.io/${{ github.repository_owner }}/autodor' | tr '[:upper:]' '[:lower:]')"
          commit_message="$(git log -1 --pretty=%s | tr '\n' ' ' | sed 's/\\/\\\\/g; s/"/\\"/g')"

          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "commit_message=$commit_message" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "${image_name}:latest"
            fi
            echo "${image_name}:${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Trigger Dokploy deploy for latest image
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_IDS: ${{ secrets.DOKPLOY_APP_IDS }}
          SHORT_SHA: ${{ steps.metadata.outputs.short_sha }}
          COMMIT_MESSAGE: ${{ steps.metadata.outputs.commit_message }}
        run: |
          set -euo pipefail

          : "${DOKPLOY_API_URL:?Missing DOKPLOY_API_URL secret}"
          : "${DOKPLOY_API_KEY:?Missing DOKPLOY_API_KEY secret}"
          : "${DOKPLOY_APP_IDS:?Missing DOKPLOY_APP_IDS secret}"

          echo "Triggering Dokploy deploy for latest image across configured apps..."

          for raw_app_id in $(echo "$DOKPLOY_APP_IDS" | tr ',' ' '); do
            app_id="$(echo "$raw_app_id" | xargs)"

            if [[ -z "$app_id" ]]; then
              continue
            fi

            echo "Deploying application $app_id"

            curl --fail-with-body --silent --show-error \
              -X POST "${DOKPLOY_API_URL}/api/trpc/applications.deployApplication" \
              -H "Authorization: Bearer ${DOKPLOY_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"0\":{\"json\":{\"applicationId\":\"${app_id}\",\"description\":\"Deploy [${SHORT_SHA}]: ${COMMIT_MESSAGE}\"}}}"

            echo
          done

      - name: Prune old GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: autodor
          package-type: container
          min-versions-to-keep: 5
          token: ${{ github.token }}