name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches: [main, slice]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/autodor
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}
          secrets: vite_clerk_publishable_key=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: autodor
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}

  trigger-webhooks:
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      # Let the other webhooks continue even if one of them fails.
      fail-fast: false
      matrix:
        # List webhook secret names here instead of storing them in one combined secret.
        secret_name:
          - WEBHOOK_URL_MTP
          - WEBHOOK_URL_DOR

    steps:
      # Resolve a single webhook URL from the current matrix entry and trigger Dokploy.
      - name: Trigger Dokploy webhook (${{ matrix.secret_name }})
        env:
          WEBHOOK_URL: ${{ secrets[matrix.secret_name] }}          
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Wyzwalanie ręczne (workflow_dispatch)' }}
        run: |
          set -euo pipefail

          # If a secret is intentionally left empty, skip it without failing the workflow.
          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "Secret ${{ matrix.secret_name }} is empty. Skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"

          # Send the same payload shape Dokploy expects from a GitHub push webhook.
          payload="$(jq -n \
            --arg ref "$GITHUB_REF" \
            --arg id "$short_sha" \
            --arg msg "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $id, message: $msg}}')"

          echo "Triggering webhook for ${{ matrix.secret_name }}..."

          curl --fail-with-body --silent --show-error \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$payload"

          echo "Successfully triggered Dokploy webhook for ${{ matrix.secret_name }}."