name: Deploy api

run-name: Deploy api from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, slice]
    paths:
      - 'apps/api/Dockerfile'
      - 'apps/api/**'
      - 'backend/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Autodor.slnx'
      - '.github/workflows/api.yml'
      - '.github/workflows/_deploy-service.yml'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service_name: api
      image_name: autodor-api
      image_file: ./apps/api/Dockerfile
      webhook_secret_names_json: '["WEBHOOK_URL_API_MTP","WEBHOOK_URL_API_DOR"]'
    secrets: inherit
