name: Build migrator image

run-name: Build migrator image from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/migrator/**'
      - 'backend/**/Migrations/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/migrator.yml'
      - '.github/workflows/_deploy-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/_deploy-image.yml
    with:
      service_name: migrator
      image_name: autodor/migrator
      image_file: ./apps/migrator/Dockerfile
    secrets: inherit
