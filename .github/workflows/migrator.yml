name: Deploy migrator

run-name: Deploy migrator from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, slice]
    paths:
      - 'apps/migrator/Dockerfile'
      - 'apps/migrator/**'
      - 'backend/**/Migrations/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Autodor.slnx'
      - '.github/workflows/migrator.yml'
      - '.github/workflows/_deploy-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-image.yml
    with:
      service_name: migrator
      image_name: autodor/migrator
      image_file: ./apps/migrator/Dockerfile
      webhook_urls_secret_name: ${{ github.ref_name == 'main' && 'PROD_WEBHOOK_URLS' || 'DEV_WEBHOOK_URLS' }}
    secrets: inherit
