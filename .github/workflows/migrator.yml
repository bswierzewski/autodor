name: Deploy migrator

run-name: Deploy migrator from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, slice]
    paths:
      - 'apps/migrator/Dockerfile'
      - 'apps/migrator/**'
      - 'backend/**/Migrations/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Autodor.slnx'
      - '.github/workflows/migrator.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-migrator-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: autodor-migrator
  IMAGE_FILE: ./apps/migrator/Dockerfile

jobs:
  build_image:
    name: Build migrator image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.IMAGE_FILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_SHA=${{ github.sha }}

      - name: Retain recent container images
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: ${{ env.IMAGE_NAME }}
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy migrator
    needs: build_image
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL_MIGRATOR }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Wyzwalanie ręczne (workflow_dispatch)' }}
        run: |
          set -euo pipefail

          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "Secret WEBHOOK_URL_MIGRATOR is empty. Skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"

          payload="$(jq -n \
            --arg ref "$GITHUB_REF" \
            --arg id "$short_sha" \
            --arg msg "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $id, message: $msg}}')"

          echo "Triggering migrator webhook..."

          curl --fail-with-body --silent --show-error \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$payload"

          echo "Successfully triggered migrator webhook."
