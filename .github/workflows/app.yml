name: Deploy app

run-name: Deploy app from ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main, slice]
    paths:
      - 'apps/web/Dockerfile'
      - 'apps/web/**'
      - '.github/workflows/app.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: autodor-app
  IMAGE_FILE: ./apps/web/Dockerfile

jobs:
  build_image:
    name: Build app image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.IMAGE_FILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Retain recent container images
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: ${{ env.IMAGE_NAME }}
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy app
    needs: build_image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        secret_name:
          - WEBHOOK_URL_APP_MTP
          - WEBHOOK_URL_APP_DOR

    steps:
      - name: Trigger Dokploy app webhook (${{ matrix.secret_name }})
        env:
          WEBHOOK_URL: ${{ secrets[matrix.secret_name] }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Wyzwalanie ręczne (workflow_dispatch)' }}
        run: |
          set -euo pipefail

          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "Secret ${{ matrix.secret_name }} is empty. Skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"

          payload="$(jq -n \
            --arg ref "$GITHUB_REF" \
            --arg id "$short_sha" \
            --arg msg "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $id, message: $msg}}')"

          echo "Triggering app webhook for ${{ matrix.secret_name }}..."

          curl --fail-with-body --silent --show-error \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$payload"

          echo "Successfully triggered Dokploy app webhook for ${{ matrix.secret_name }}."
