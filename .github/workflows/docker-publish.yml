name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - slice
    paths:
      - '.dockerignore'
      - 'Dockerfile'
      - 'apps/api/**'
      - 'apps/web/**'
      - 'backend/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository_owner }}/autodor' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute build metadata
        id: metadata
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.created=${{ steps.metadata.outputs.build_time }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Prune old GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: autodor
          package-type: container
          min-versions-to-keep: 5
          token: ${{ github.token }}