name: Deploy image

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      image_file:
        required: true
        type: string
      webhook_secret_names_json:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ""
      build_arg_secret_name:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_image:
    name: Build ${{ inputs.service_name }} image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.image_file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ inputs.build_args }}
            ${{ inputs.build_arg_secret_name && format('{0}={1}', inputs.build_arg_secret_name, secrets[inputs.build_arg_secret_name]) || '' }}

      - name: Retain recent container images
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: ${{ inputs.image_name }}
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy ${{ inputs.service_name }}
    needs: build_image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        secret_name: ${{ fromJson(inputs.webhook_secret_names_json) }}

    steps:
      - name: Trigger Dokploy webhook (${{ matrix.secret_name }})
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets[matrix.secret_name] }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Wyzwalanie ręczne (workflow_dispatch)' }}
          SERVICE_NAME: ${{ inputs.service_name }}
        run: |
          set -euo pipefail

          if [[ -z "$WEBHOOK_URL" ]]; then
            echo "Secret ${{ matrix.secret_name }} is empty. Skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"

          payload="$(jq -n \
            --arg ref "$GITHUB_REF" \
            --arg id "$short_sha" \
            --arg msg "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $id, message: $msg}}')"

          echo "Triggering ${SERVICE_NAME} webhook for ${{ matrix.secret_name }}..."

          curl --fail-with-body --silent --show-error \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$payload"

          echo "Successfully triggered ${SERVICE_NAME} webhook for ${{ matrix.secret_name }}."
