name: Deploy image

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      image_file:
        required: true
        type: string
      webhook_urls_secret_name:
        required: false
        type: string
        default: ""
      build_args:
        required: false
        type: string
        default: ""
      build_arg_secret_name:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.image_file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ inputs.build_args }}
            ${{ inputs.build_arg_secret_name && format('{0}={1}', inputs.build_arg_secret_name, secrets[inputs.build_arg_secret_name]) || '' }}

      - name: Retain recent container images
        continue-on-error: true
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: user
          image-names: ${{ inputs.image_name }}
          image-tags: "*"
          tag-selection: both
          keep-n-most-recent: 5
          cut-off: 1m
          token: ${{ secrets.GITHUB_TOKEN }}

  Deploy:
    name: Deploy
    needs: Publish
    if: inputs.webhook_urls_secret_name != ''
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy webhooks from ${{ inputs.webhook_urls_secret_name }}
        continue-on-error: true
        shell: bash
        env:
          WEBHOOK_URLS_JSON: ${{ secrets[inputs.webhook_urls_secret_name] }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Wyzwalanie ręczne (workflow_dispatch)' }}
          SERVICE_NAME: ${{ inputs.service_name }}
        run: |
          set -euo pipefail

          if [[ -z "$WEBHOOK_URLS_JSON" ]]; then
            echo "Secret ${{ inputs.webhook_urls_secret_name }} is empty or does not exist. Skipping Dokploy deployment."
            exit 0
          fi

          if ! jq -e '
            type == "array" and length > 0 and
            all(.[];
              type == "string" and
              (startswith("https://") or startswith("http://")) and
              (contains("\n") | not) and
              (contains("\r") | not)
            )
          ' \
            <<< "$WEBHOOK_URLS_JSON" > /dev/null; then
            echo "Secret ${{ inputs.webhook_urls_secret_name }} must be a non-empty JSON array of HTTP(S) URLs. Skipping Dokploy deployment."
            exit 0
          fi

          mapfile -t webhook_urls < <(jq -r '.[]' <<< "$WEBHOOK_URLS_JSON")
          short_sha="${GITHUB_SHA:0:7}"

          payload="$(jq -n \
            --arg ref "$GITHUB_REF" \
            --arg id "$short_sha" \
            --arg msg "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $id, message: $msg}}')"

          failed=0

          for webhook_url in "${webhook_urls[@]}"; do
            echo "::add-mask::$webhook_url"
            echo "Triggering ${SERVICE_NAME} webhook..."

            if ! curl --fail-with-body --silent --show-error \
                -X POST "$webhook_url" \
                -H "Content-Type: application/json" \
                -H "X-GitHub-Event: push" \
                -d "$payload"; then
              echo "::warning::Failed to trigger ${SERVICE_NAME} webhook. Continuing the pipeline."
              failed=1
              continue
            fi

            echo "Successfully triggered ${SERVICE_NAME} webhook."
          done

          exit "$failed"
